<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <!-- BUSTED letters: B U S T E D — 6 glyphs in chunky block style -->
    <!-- B: vertical bar + two stacked half-circles approximated by paths -->
    <path id="p-B" d="M 100 70 L 100 180 L 160 180 L 175 165 L 175 135 L 160 122 L 100 122 M 100 122 L 155 122 L 168 110 L 168 82 L 155 70 L 100 70" />
    <!-- U: left vertical, bottom curve, right vertical -->
    <path id="p-U" d="M 200 70 L 200 165 L 215 180 L 260 180 L 275 165 L 275 70" />
    <!-- S: top horizontal, vertical down to middle, middle horizontal, vertical down to bottom, bottom horizontal -->
    <path id="p-S" d="M 365 70 L 305 70 L 305 122 L 365 122 L 365 180 L 305 180" />
    <!-- T: top horizontal, vertical bar centered -->
    <g id="p-T">
      <path d="M 395 70 L 475 70" />
      <path d="M 435 70 L 435 180" />
    </g>
    <!-- E: same shape as WINNER E -->
    <path id="p-E" d="M 565 70 L 505 70 L 505 125 L 555 125 M 505 125 L 505 180 L 565 180" />
    <!-- D: vertical bar + curved right side -->
    <path id="p-D" d="M 595 70 L 595 180 L 650 180 L 680 160 L 690 130 L 680 100 L 650 70 L 595 70" />

    <!-- Heavy red glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b1" />
      <feGaussianBlur in="b1" stdDeviation="3" result="b2" />
      <feMerge>
        <feMergeNode in="b2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>

    <linearGradient id="hud-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ef4444" stop-opacity="0" />
      <stop offset="20%"  stop-color="#ef4444" stop-opacity="0.85" />
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="1" />
      <stop offset="80%"  stop-color="#ef4444" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- TRANSPARENT background — no banner frame, no corner brackets -->


  <!-- Horizontal flash sweep -->
  <line x1="0" y1="130" x2="0" y2="130" stroke="#ffffff" stroke-width="5" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" begin="0.05s" dur="0.30s" fill="freeze" />
    <animate attributeName="x2" values="0;800" begin="0.05s" dur="0.30s" fill="freeze" />
    <animate attributeName="x1" values="0;0;800" keyTimes="0;0.5;1" begin="0.05s" dur="0.30s" fill="freeze" />
  </line>

  <!-- (removed: top/bottom HUD lines that read as a rectangular border) -->

  <!-- Red halo behind text -->
  <g filter="url(#glow)" stroke="#ef4444" stroke-width="22" stroke-linecap="square" stroke-linejoin="miter" fill="none" opacity="0">
    <animate attributeName="opacity" values="0;0.85;0.55;0.85" keyTimes="0;0.25;0.6;1" begin="0.55s" dur="0.7s" fill="freeze" />
    <use href="#p-B" />
    <use href="#p-U" />
    <use href="#p-S" />
    <use href="#p-T" />
    <use href="#p-E" />
    <use href="#p-D" />
  </g>

  <!-- Core letters with brief RGB glitch reveal -->
  <g stroke-width="18" stroke-linecap="square" stroke-linejoin="miter" fill="none">
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.20s" dur="0.01s" fill="freeze" />
      <use href="#p-B" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="8,0;-6,2;0,0" begin="0.20s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.20s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-B" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-8,0;6,-2;0,0" begin="0.20s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.20s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-B" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.20s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.27s" dur="0.01s" fill="freeze" />
      <use href="#p-U" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="8,0;-6,2;0,0" begin="0.27s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.27s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-U" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-8,0;6,-2;0,0" begin="0.27s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.27s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-U" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.27s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.34s" dur="0.01s" fill="freeze" />
      <use href="#p-S" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="8,0;-6,2;0,0" begin="0.34s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.34s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-S" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-8,0;6,-2;0,0" begin="0.34s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.34s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-S" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.34s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.41s" dur="0.01s" fill="freeze" />
      <use href="#p-T" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="8,0;-6,2;0,0" begin="0.41s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.41s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-T" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-8,0;6,-2;0,0" begin="0.41s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.41s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-T" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.41s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.48s" dur="0.01s" fill="freeze" />
      <use href="#p-E" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="8,0;-6,2;0,0" begin="0.48s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.48s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-E" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-8,0;6,-2;0,0" begin="0.48s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.48s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-E" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.48s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.55s" dur="0.01s" fill="freeze" />
      <use href="#p-D" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="8,0;-6,2;0,0" begin="0.55s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.55s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-D" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-8,0;6,-2;0,0" begin="0.55s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.55s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-D" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.55s" dur="0.18s" fill="freeze" /></use>
    </g>
  </g>
</svg>
