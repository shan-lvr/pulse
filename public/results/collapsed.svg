<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <!-- COLLAPSED — 9 chunky letters fit across the banner -->
    <!-- C: open box facing right (top, left, bottom) -->
    <path id="p-C" d="M 130 80 L 90 80 L 80 95 L 80 155 L 90 170 L 130 170" />
    <!-- O: octagonal/rounded -->
    <path id="p-O" d="M 165 95 L 175 80 L 215 80 L 225 95 L 225 155 L 215 170 L 175 170 L 165 155 Z" />
    <!-- L1, L2: vertical + bottom horizontal -->
    <path id="p-L1" d="M 250 70 L 250 170 L 295 170" />
    <path id="p-L2" d="M 315 70 L 315 170 L 360 170" />
    <!-- A: triangular -->
    <path id="p-A" d="M 380 170 L 410 70 L 440 170 M 388 140 L 432 140" />
    <!-- P: vertical + top loop -->
    <path id="p-P" d="M 460 170 L 460 70 L 510 70 L 520 80 L 520 115 L 510 125 L 460 125" />
    <!-- S: zig zag -->
    <path id="p-S" d="M 590 70 L 540 70 L 540 115 L 590 115 L 590 170 L 540 170" />
    <!-- E: bracket facing right -->
    <path id="p-E" d="M 665 70 L 615 70 L 615 115 L 655 115 M 615 115 L 615 170 L 665 170" />
    <!-- D: rounded right -->
    <path id="p-D" d="M 690 70 L 690 170 L 730 170 L 750 155 L 755 125 L 750 95 L 730 80 L 690 70" />

    <!-- Heavy red glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b1" />
      <feGaussianBlur in="b1" stdDeviation="3" result="b2" />
      <feMerge>
        <feMergeNode in="b2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>

    <linearGradient id="hud-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ef4444" stop-opacity="0" />
      <stop offset="20%"  stop-color="#ef4444" stop-opacity="0.85" />
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="1" />
      <stop offset="80%"  stop-color="#ef4444" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- TRANSPARENT background — no banner frame, no corner brackets -->


  <!-- Horizontal "fault line" sweep — extra glitch flicker -->
  <line x1="0" y1="130" x2="0" y2="130" stroke="#ffffff" stroke-width="5" opacity="0">
    <animate attributeName="opacity" values="0;1;0.4;1;0.4;0" keyTimes="0;0.1;0.3;0.5;0.7;1" begin="0.05s" dur="0.35s" fill="freeze" />
    <animate attributeName="x2" values="0;800" begin="0.05s" dur="0.35s" fill="freeze" />
    <animate attributeName="x1" values="0;0;800" keyTimes="0;0.5;1" begin="0.05s" dur="0.35s" fill="freeze" />
  </line>

  <!-- (removed: top/bottom HUD lines that read as a rectangular border) -->

  <!-- Red halo behind text -->
  <g filter="url(#glow)" stroke="#ef4444" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter" fill="none" opacity="0">
    <animate attributeName="opacity" values="0;0.85;0.55;0.85" keyTimes="0;0.25;0.6;1" begin="0.55s" dur="0.7s" fill="freeze" />
    <use href="#p-C" />
    <use href="#p-O" />
    <use href="#p-L1" />
    <use href="#p-L2" />
    <use href="#p-A" />
    <use href="#p-P" />
    <use href="#p-S" />
    <use href="#p-E" />
    <use href="#p-D" />
  </g>

  <!-- Core letters with brief RGB glitch reveal — slightly faster stagger so all 9 fit -->
  <g stroke-width="11" stroke-linecap="square" stroke-linejoin="miter" fill="none">
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.20s" dur="0.01s" fill="freeze" />
      <use href="#p-C" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.20s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.20s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-C" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.20s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.20s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-C" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.20s" dur="0.16s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.25s" dur="0.01s" fill="freeze" />
      <use href="#p-O" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.25s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.25s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-O" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.25s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.25s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-O" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.25s" dur="0.16s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.30s" dur="0.01s" fill="freeze" />
      <use href="#p-L1" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.30s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.30s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-L1" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.30s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.30s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-L1" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.30s" dur="0.16s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.35s" dur="0.01s" fill="freeze" />
      <use href="#p-L2" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.35s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.35s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-L2" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.35s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.35s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-L2" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.35s" dur="0.16s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.40s" dur="0.01s" fill="freeze" />
      <use href="#p-A" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.40s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.40s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-A" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.40s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.40s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-A" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.40s" dur="0.16s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.45s" dur="0.01s" fill="freeze" />
      <use href="#p-P" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.45s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.45s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-P" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.45s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.45s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-P" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.45s" dur="0.16s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.50s" dur="0.01s" fill="freeze" />
      <use href="#p-S" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.50s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.50s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-S" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.50s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.50s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-S" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.50s" dur="0.16s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.55s" dur="0.01s" fill="freeze" />
      <use href="#p-E" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.55s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.55s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-E" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.55s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.55s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-E" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.55s" dur="0.16s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.60s" dur="0.01s" fill="freeze" />
      <use href="#p-D" stroke="#fca5a5"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.60s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.60s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-D" stroke="#ef4444"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.60s" dur="0.16s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.60s" dur="0.16s" fill="freeze" /></use>
      <use href="#p-D" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.60s" dur="0.16s" fill="freeze" /></use>
    </g>
  </g>

</svg>
