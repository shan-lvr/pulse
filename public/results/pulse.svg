<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <!-- PULSE letterforms — chunky 18px stroke block style, baseline y=160, cap-height y=60 -->
    <path id="p-P" d="M 130 160 L 130 60 L 220 60 L 240 80 L 240 130 L 220 150 L 130 150" />
    <path id="p-U" d="M 270 60 L 270 145 L 290 160 L 340 160 L 360 145 L 360 60" />
    <path id="p-L" d="M 390 60 L 390 160 L 460 160" />
    <path id="p-S" d="M 570 60 L 490 60 L 490 105 L 570 105 L 570 160 L 490 160" />
    <path id="p-E" d="M 670 60 L 600 60 L 600 105 L 660 105 M 600 105 L 600 160 L 670 160" />

    <!-- Cyan glow filter (single pass — header stays performant) -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" />
    </filter>

    <linearGradient id="hud-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0" />
      <stop offset="20%"  stop-color="#22d3ee" stop-opacity="0.9" />
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="1" />
      <stop offset="80%"  stop-color="#22d3ee" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- TRANSPARENT background -->

  <!-- Corner brackets — small, framing the header -->
  <g stroke="#67e8f9" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" fill="none" opacity="0">
    <path d="M 70 65 L 70 35 L 100 35" />
    <path d="M 730 65 L 730 35 L 700 35" />
    <path d="M 70 155 L 70 185 L 100 185" />
    <path d="M 730 155 L 730 185 L 700 185" />
    <animate attributeName="opacity" values="0;0.8" begin="0.05s" dur="0.15s" fill="freeze" />
  </g>

  <!-- Horizontal HUD line under the wordmark — sweeps in -->
  <line x1="400" y1="195" x2="400" y2="195" stroke="url(#hud-line)" stroke-width="2.5">
    <animate attributeName="x1" values="400;130" begin="0.45s" dur="0.5s" calcMode="spline" keySplines="0.1 0.8 0.2 1" fill="freeze" />
    <animate attributeName="x2" values="400;670" begin="0.45s" dur="0.5s" calcMode="spline" keySplines="0.1 0.8 0.2 1" fill="freeze" />
  </line>

  <!-- Cyan glow halo behind text -->
  <g filter="url(#glow)" stroke="#22d3ee" stroke-width="20" stroke-linecap="square" stroke-linejoin="miter" fill="none" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0.65;0.85" keyTimes="0;0.25;0.6;1" begin="0.45s" dur="0.7s" fill="freeze" />
    <use href="#p-P" />
    <use href="#p-U" />
    <use href="#p-L" />
    <use href="#p-S" />
    <use href="#p-E" />
  </g>

  <!-- Core letters with brief RGB-split glitch reveal -->
  <g stroke-width="14" stroke-linecap="square" stroke-linejoin="miter" fill="none">
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.15s" dur="0.01s" fill="freeze" />
      <use href="#p-P" stroke="#6ee7b7"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.15s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.15s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-P" stroke="#22d3ee"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.15s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.15s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-P" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.15s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.22s" dur="0.01s" fill="freeze" />
      <use href="#p-U" stroke="#6ee7b7"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.22s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.22s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-U" stroke="#22d3ee"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.22s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.22s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-U" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.22s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.29s" dur="0.01s" fill="freeze" />
      <use href="#p-L" stroke="#6ee7b7"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.29s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.29s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-L" stroke="#22d3ee"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.29s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.29s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-L" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.29s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.36s" dur="0.01s" fill="freeze" />
      <use href="#p-S" stroke="#6ee7b7"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.36s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.36s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-S" stroke="#22d3ee"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.36s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.36s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-S" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.36s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.43s" dur="0.01s" fill="freeze" />
      <use href="#p-E" stroke="#6ee7b7"><animateTransform attributeName="transform" type="translate" values="6,0;-4,2;0,0" begin="0.43s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.43s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-E" stroke="#22d3ee"><animateTransform attributeName="transform" type="translate" values="-6,0;4,-2;0,0" begin="0.43s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.43s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-E" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.43s" dur="0.18s" fill="freeze" /></use>
    </g>
  </g>
</svg>
