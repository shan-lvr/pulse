<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <!-- Block-letter glyph paths. Stroke set on parent group.
         Cap-height y=70, baseline y=180 → 110px tall. -->
    <path id="p-W" d="M 100 70 L 138 180 L 180 100 L 222 180 L 260 70" />
    <!-- I with chunky serifs that match other letter widths -->
    <g id="p-I">
      <path d="M 277 70 L 327 70" />
      <path d="M 302 70 L 302 180" />
      <path d="M 277 180 L 327 180" />
    </g>
    <path id="p-N1" d="M 350 180 L 350 70 L 422 180 L 422 70" />
    <path id="p-N2" d="M 445 180 L 445 70 L 517 180 L 517 70" />
    <path id="p-E"  d="M 600 70 L 540 70 L 540 125 L 590 125 M 540 125 L 540 180 L 600 180" />
    <path id="p-R"  d="M 625 180 L 625 70 L 695 70 L 695 125 L 625 125 M 660 125 L 700 180" />

    <!-- Heavy cyan glow filter (double pass) -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b1" />
      <feGaussianBlur in="b1" stdDeviation="3" result="b2" />
      <feMerge>
        <feMergeNode in="b2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Soft outer halo for the banner ring -->
    <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>

    <linearGradient id="hud-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0" />
      <stop offset="20%"  stop-color="#22d3ee" stop-opacity="0.85" />
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="1" />
      <stop offset="80%"  stop-color="#22d3ee" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- TRANSPARENT background — no banner frame, no corner brackets -->


  <!-- Horizontal flash sweep (left → right) -->
  <line x1="0" y1="130" x2="0" y2="130" stroke="#ffffff" stroke-width="5" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" begin="0.05s" dur="0.30s" fill="freeze" />
    <animate attributeName="x2" values="0;800" begin="0.05s" dur="0.30s" fill="freeze" />
    <animate attributeName="x1" values="0;0;800" keyTimes="0;0.5;1" begin="0.05s" dur="0.30s" fill="freeze" />
  </line>

  <!-- (removed: top/bottom HUD lines that read as a rectangular border) -->

  <!-- Soft cyan halo behind text (the GLOW LAYER) -->
  <g filter="url(#glow)" stroke="#22d3ee" stroke-width="22" stroke-linecap="square" stroke-linejoin="miter" fill="none" opacity="0">
    <animate attributeName="opacity" values="0;0.85;0.55;0.85" keyTimes="0;0.25;0.6;1" begin="0.55s" dur="0.7s" fill="freeze" />
    <use href="#p-W" />
    <use href="#p-I" />
    <use href="#p-N1" />
    <use href="#p-N2" />
    <use href="#p-E" />
    <use href="#p-R" />
  </g>

  <!-- Core letters with brief RGB glitch reveal, staggered -->
  <g stroke-width="18" stroke-linecap="square" stroke-linejoin="miter" fill="none">
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.20s" dur="0.01s" fill="freeze" />
      <use href="#p-W" stroke="#6ee7b7"><animateTransform attributeName="transform" type="translate" values="8,0;-6,2;0,0" begin="0.20s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.20s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-W" stroke="#22d3ee"><animateTransform attributeName="transform" type="translate" values="-8,0;6,-2;0,0" begin="0.20s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.20s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-W" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.20s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.27s" dur="0.01s" fill="freeze" />
      <use href="#p-I" stroke="#6ee7b7"><animateTransform attributeName="transform" type="translate" values="8,0;-6,2;0,0" begin="0.27s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.27s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-I" stroke="#22d3ee"><animateTransform attributeName="transform" type="translate" values="-8,0;6,-2;0,0" begin="0.27s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.27s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-I" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.27s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.34s" dur="0.01s" fill="freeze" />
      <use href="#p-N1" stroke="#6ee7b7"><animateTransform attributeName="transform" type="translate" values="8,0;-6,2;0,0" begin="0.34s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.34s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-N1" stroke="#22d3ee"><animateTransform attributeName="transform" type="translate" values="-8,0;6,-2;0,0" begin="0.34s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.34s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-N1" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.34s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.41s" dur="0.01s" fill="freeze" />
      <use href="#p-N2" stroke="#6ee7b7"><animateTransform attributeName="transform" type="translate" values="8,0;-6,2;0,0" begin="0.41s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.41s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-N2" stroke="#22d3ee"><animateTransform attributeName="transform" type="translate" values="-8,0;6,-2;0,0" begin="0.41s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.41s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-N2" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.41s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.48s" dur="0.01s" fill="freeze" />
      <use href="#p-E" stroke="#6ee7b7"><animateTransform attributeName="transform" type="translate" values="8,0;-6,2;0,0" begin="0.48s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.48s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-E" stroke="#22d3ee"><animateTransform attributeName="transform" type="translate" values="-8,0;6,-2;0,0" begin="0.48s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.48s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-E" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.48s" dur="0.18s" fill="freeze" /></use>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.55s" dur="0.01s" fill="freeze" />
      <use href="#p-R" stroke="#6ee7b7"><animateTransform attributeName="transform" type="translate" values="8,0;-6,2;0,0" begin="0.55s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.55s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-R" stroke="#22d3ee"><animateTransform attributeName="transform" type="translate" values="-8,0;6,-2;0,0" begin="0.55s" dur="0.18s" fill="freeze" /><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="0.55s" dur="0.18s" fill="freeze" /></use>
      <use href="#p-R" stroke="#ffffff" opacity="0"><animate attributeName="opacity" values="0;0.5;1" keyTimes="0;0.5;1" begin="0.55s" dur="0.18s" fill="freeze" /></use>
    </g>
  </g>

  <!-- (removed: side data ticks that read as left/right border accents) -->
</svg>
